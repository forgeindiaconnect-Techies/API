version: "3.9"

services:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - aistudio

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434 # Or set to your external GPU server URL: e.g., https://xxxx.proxy.runpod.net:11434
      - ALLOWED_ORIGINS=http://localhost:3000
      - ORT_LOGGING_LEVEL=3
      - ONNXRUNTIME_PROVIDERS=CPUExecutionProvider
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/models_store:/app/models_store
    depends_on:
      - mongo
      - redis
    networks:
      - aistudio

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info -Q datasets,training,rag
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ORT_LOGGING_LEVEL=3
      - ONNXRUNTIME_PROVIDERS=CPUExecutionProvider
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
      - redis
    networks:
      - aistudio

  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=aistudio
    networks:
      - aistudio

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aistudio

  # ─── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aistudio
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  mongo_data:
  redis_data:
  ollama_data:

networks:
  aistudio:
    driver: bridge
